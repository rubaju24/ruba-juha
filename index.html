<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="top">
        <span>DEG</span>
        <span>F-E</span>
      </div>

      <input type="text" id="display" disabled />

      <div class="memory">
        <span>MC</span>
        <span>MR</span>
        <span>M+</span>
        <span>M-</span>
        <span>MS</span>
      </div>

      <div class="buttons">
        <button data-func="square">x²</button>
        <button data-func="inverse">1/x</button>
        <button data-func="abs">|x|</button>
        <button data-func="exp">exp</button>
        <button data-value="%">mod</button>
        <button id="clear">C</button>

        <button data-func="sqrt">√</button>
        <button data-value="(">(</button>
        <button data-value=")">)</button>
        <button data-func="fact">n!</button>
        <button data-value="/">÷</button>

        <button data-func="pow">xʸ</button>
        <button data-func="sin">sin</button>
        <button data-func="cos">cos</button>
        <button data-func="tan">tan</button>
        <button data-value="*">×</button>

        <button data-func="tenpow">10ˣ</button>
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="-">-</button>

        <button data-func="log">log</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="+">+</button>

        <button data-func="ln">ln</button>
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button id="equal">=</button>

        <button id="pi">π</button>
        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button id="delete">⌫</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
