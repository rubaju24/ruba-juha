<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculat</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="calculator">
      <input type="text" id="display" disabled />

      <div class="memory">
        <button id="mc">MC</button>
        <button id="mr">MR</button>
        <button id="mplus">M+</button>
        <button id="mminus">M-</button>
        <button id="ms">MS</button>
      </div>

      <!-- 🆕 قسم الدوال المثلثية مع القائمة المنسدلة -->
      <div class="func-section">
        <div class="custom-dropdown" id="funcDropdown">
          <button class="dropdown-btn" id="dropdownBtn">sin</button>
          <ul class="dropdown-options hidden" id="dropdownOptions">
            <li data-value="sin">sin</li>
            <li data-value="cos">cos</li>
            <li data-value="tan">tan</li>
            <li data-value="asin">sin⁻¹</li>
            <li data-value="acos">cos⁻¹</li>
            <li data-value="atan">tan⁻¹</li>
            <li data-value="sinh">sinh</li>
            <li data-value="cosh">cosh</li>
            <li data-value="tanh">tanh</li>
          </ul>
        </div>
        <!-- 🆕 القائمة المنسدلة للدوال الإضافية -->
        <div class="custom-dropdown" id="extraDropdown">
          <button class="dropdown-btn" id="extraDropdownBtn">rand</button>
          <ul class="dropdown-options hidden" id="extraDropdownOptions">
            <li data-value="rand">rand</li>
            <li data-value="deg">deg</li>
            <li data-value="dms">dms</li>
            <li data-value="floor">⌊x⌋</li>
            <li data-value="ceil">⌈x⌉</li>
            <li data-value="abs">|x|</li>
          </ul>
        </div>

        <!-- 🆕 زر تطبيق الدوال الإضافية -->
        <button id="applyFunc" class="func-btn">Apply</button>
        <!-- أزرار التحكم بوحدة الزاوية -->
        <div class="angle-mode">
          <button id="degMode" class="mode-btn active">DEG</button>
          <button id="radMode" class="mode-btn">RAD</button>
        </div>
      </div>

      <div class="buttons">
        <button id="2^nd">2ⁿᵈ</button>
        <button id="pi">π</button>
        <button id="e">e</button>
        <button id="clear">C</button>
        <button id="delete">⌫</button>
        <button id="square" data-primary="x²" data-alt="x³">x²</button>
        <button id="cubeRoot" style="display: none">∛</button>
        <!-- زر مخفي للجذر التكعيبي -->

        <button id="inverse">1/x</button>
        <button id="absolute">|x|</button>
        <button id="exp">exp</button>
        <button id="mod">mod</button>
        <button id="sqrt" data-primary="√" data-alt="∛">√</button>
        <button id="open">(</button>
        <button id="close">)</button>
        <button id="factorial">n!</button>
        <button data-value="/">÷</button>
        <button id="power" data-primary="xʸ" data-alt="ʸ√x">xʸ</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="*">×</button>
        <button id="tenPower" data-primary="10ˣ" data-alt="2ˣ">10ˣ</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="-">-</button>
        <button id="log" data-primary="log" data-alt="logᵧx">log</button>
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="+">+</button>
        <button id="ln" data-primary="ln" data-alt="eˣ">ln</button>

        <button id="percent">%</button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button id="equal">=</button>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
